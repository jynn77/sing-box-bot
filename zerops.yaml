zerops:
  - setup: python
    build:
      base: alpine/python@3.12
      deployFiles:
        - zerops/app.py
        - .cache/private.key
        - .cache/cert.pem
      addToRunPrepare:
        - zerops/requirements.txt
    run:
      base: alpine/python@3.12
      ports:
        - port: 3000
          httpSupport: true
        - port: 25983
      prepareCommands:
        - python3 -m pip install -r requirements.txt --ignore-installed
      start: python3 zerops/app.py