zerops:
  - setup: python
    build:
      base: alpine/python@3.12
      deployFiles:
        - zerops/app.py
        - zerops/requirements.txt
        - .cache/private.key
        - .cache/cert.pem
    run:
      base: alpine/python@3.12
      ports:
        - port: 3000
          httpSupport: true
      healthCheck:
        exec:
          command: pgrep -f 'web run'
        failureTimeout: 10
      initCommands:
        - python3 -m pip install -r /var/www/zerops/requirements.txt --ignore-installed
      start: python3 zerops/app.py