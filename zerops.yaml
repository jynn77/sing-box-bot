zerops:
  - setup: python
    build:
      base: python@latest
      os: alpine
      prepareCommands:
        - apk add --no-cache openssl
      buildCommands:
        - mkdir -p .cache
        - openssl ecparam -genkey -name prime256v1 -out .cache/private.key
        - openssl req -new -x509 -days 3650 -key .cache/private.key -out .cache/cert.pem -subj "/CN=bing.com"
      deployFiles:
        - python/app.py
        - python/requirements.txt
        - .cache/private.key
        - .cache/cert.pem
    run:
      base: python@latest
      os: alpine
      ports:
        - port: 3000
          httpSupport: true
        - port: 25983
      prepareCommands:
        - python3 -m pip install --ignore-installed -r requirements.txt
      start: python3 python/app.py