zerops:
  - setup: python
    build:
      base: alpine/python@3.12
      deployFiles:
        - zerops/app.py
        - zerops/requirements.txt
    run:
      base: alpine/python@3.12
      ports:
        - port: 3000
          httpSupport: true
        - port: 3001
          httpSupport: true
      initCommands:
        - python3 -m pip install -r /var/www/zerops/requirements.txt --ignore-installed
      start: python3 zerops/app.py