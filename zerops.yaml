zerops:
  - setup: python
    build:
      base: python@latest
      os: alpine
      deployFiles:
        - zerops/app.py
        - zerops/requirements.txt
        - .cache/private.key
        - .cache/cert.pem
    run:
      base: python@latest
      os: alpine
      ports:
        - port: 3000
          httpSupport: true
        - port: 25983
      prepareCommands:
        - python3 -m pip install --ignore-installed -r requirements.txt
      start: python3 zerops/app.py